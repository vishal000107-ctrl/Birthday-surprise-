<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Surprise for Rahul</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f0c29;
            background: linear-gradient(45deg, #24243e, #302b63, #0f0c29);
            font-family: 'Arial Black', sans-serif;
            overflow-x: hidden;
            color: white;
        }

        /* Gift Box Section */
        #gift-scene {
            text-align: center;
            cursor: pointer;
            z-index: 100;
        }

        .box {
            position: relative;
            width: 120px;
            height: 100px;
            background: #ff3e3e;
            margin: 0 auto;
            border-radius: 0 0 10px 10px;
            animation: shake 1.5s infinite;
        }

        .box::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background: #ffcc00;
            left: 50%;
            transform: translateX(-50%);
        }

        .lid {
            position: absolute;
            width: 140px;
            height: 30px;
            background: #ff3e3e;
            top: -30px;
            left: -10px;
            border-radius: 5px;
        }

        .lid::before {
            content: '';
            position: absolute;
            width: 25px;
            height: 100%;
            background: #ffcc00;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes shake {
            0%, 100% { transform: rotate(0); }
            20%, 60% { transform: rotate(-10deg); }
            40%, 80% { transform: rotate(10deg); }
        }

        .tap-text {
            margin-top: 30px;
            font-size: 1rem;
            letter-spacing: 2px;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        /* Surprise Content */
        #surprise-container {
            display: none;
            text-align: center;
            padding: 20px;
            max-width: 600px;
        }

        .main-wish {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, #ffcc00, #ff3e3e, #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite, bounceIn 1s ease-out;
            text-transform: uppercase;
        }

        /* Photo Grid - 4 Photos */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .photo-card {
            background: white;
            padding: 8px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
            opacity: 0;
            transform: scale(0.5);
        }

        /* individual animations for 4 photos */
        .photo-card:nth-child(1) { animation: popUp 0.6s forwards 0.5s; transform: rotate(-5deg); }
        .photo-card:nth-child(2) { animation: popUp 0.6s forwards 0.8s; transform: rotate(5deg); }
        .photo-card:nth-child(3) { animation: popUp 0.6s forwards 1.1s; transform: rotate(-3deg); }
        .photo-card:nth-child(4) { animation: popUp 0.6s forwards 1.4s; transform: rotate(3deg); }

        .photo-card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 5px;
        }

        @keyframes popUp {
            to { opacity: 1; transform: scale(1) rotate(var(--rotation)); }
        }

        @keyframes shine { to { background-position: 200% center; } }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -20px;
            animation: fall 3s linear forwards;
        }

        @keyframes fall { to { transform: translateY(110vh) rotate(720deg); } }
    </style>
</head>
<body>

    <div id="gift-scene" onclick="revealSurprise()">
        <div class="box">
            <div class="lid"></div>
        </div>
        <div class="tap-text">CLICK TO OPEN SURPRISE</div>
    </div>

    <div id="surprise-container">
        <h1 class="main-wish">Happy Birthday<br>Rahul!</h1>
        
        <div class="photo-grid">
            <div class="photo-card" style="--rotation: -5deg;">
                <img src="https://i.ibb.co/xtCGWHKj/image1.png" alt="Memory 1">
            </div>
            <div class="photo-card" style="--rotation: 5deg;">
                <img src="https://i.ibb.co/xtCGWHKj/image2.png" alt="Memory 2">
            </div>
            <div class="photo-card" style="--rotation: -3deg;">
                <img src="https://i.ibb.co/xtCGWHKj/image3.png" alt="Memory 3">
            </div>
            <div class="photo-card" style="--rotation: 3deg;">
                <img src="https://i.ibb.co/xtCGWHKj/image4.png" alt="Memory 4">
            </div>
        </div>

        <p style="margin-top: 30px; font-family: sans-serif;">Wishing you a fantastic year ahead, Rahul! 🎂</p>
    </div>

    <script>
        function revealSurprise() {
            document.getElementById('gift-scene').style.display = 'none';
            const container = document.getElementById('surprise-container');
            container.style.display = 'block';
            setInterval(createConfetti, 100);
        }

        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 50%)`;
            confetti.style.width = (Math.random() * 8 + 5) + 'px';
            confetti.style.height = (Math.random() * 8 + 5) + 'px';
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 3000);
        }
    </script>
</body>
</html>
